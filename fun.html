<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS-Fun Mode</title>
    <link rel="stylesheet" href="fun.css">
</head>
<body>
     <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="game.html">Game</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="classic.html">Classic Mode</a></li>
            </ul>
        </nav>
    </header>
    <h1>Rock Paper Scissors</h1>
    <h2>Fun Mode</h2>

    <div class="moves">
      <button type="button" data-move="Rock" onclick="playGame('rock')" class="move-button" aria-label="Rock">
        <img src="rock-emoji.png" class="move-icon" alt="rock">
      </button>

      <button type="button" data-move="Paper" onclick="playGame('paper')" class="move-button" aria-label="Paper">
        <img src="paper-emoji.png" class="move-icon" alt="paper">
      </button>

      <button type="button" data-move="Scissors" onclick="playGame('scissors')" class="move-button" aria-label="Scissors">
        <img src="scissors-emoji.png" class="move-icon" alt="scissors">
      </button>
    </div>

    <p class="js-result result"></p>
    <p class="js-moves"></p>
    <p class="js-score score"></p>

    <button
    on onclick="
      score.wins = 0;
      score.losses = 0;
      score.ties = 0;
      localStorage.removeItem('score');
      updateScoreElement();
    " class="reset-score-button">Reset Score</button>
    <script src="fun.js"></script>

    <footer>
        <p>&copy; 2026 Rock, Paper, Scissors Game. All rights reserved.</p>
    </footer>
</body>
</html>
